<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>Publish Daily</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --cell-empty: #252c35;
  --cell-gap: 5px;
  --cell-size: clamp(13px, 1.3vw, 22px);
  --cell-radius: 3px;
  --feed-width: 590px;
}

html { background: var(--bg); color: var(--text); }

#bg-year {
  position: fixed;
  top: 20px;
  left: 24px;
  font-family: 'Averia Serif Libre', serif;
  font-size: 14vw;
  font-weight: 700;
  color: rgba(255,255,255,0.03);
  z-index: 0;
  pointer-events: none;
  line-height: 1;
  user-select: none;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Calendar Section ──────────────────────────────────────────── */
#calendar-section {
  min-height: calc(100vh - 60px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 20px;
  position: relative;
  z-index: 1;
}

#calendar-section h1 {
  font-family: 'Averia Serif Libre', serif;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
}

/* Legend */
#legend {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--text-muted);
}
#legend .swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: var(--cell-radius);
  margin-right: 4px;
  vertical-align: middle;
}

/* Calendar row layout */
#calendar-flow {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
  padding: 0 8px;
}

.calendar-row {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.cal-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  -webkit-text-stroke: 3px var(--bg);
  paint-order: stroke fill;
}

.row-months {
  display: flex;
  margin-bottom: -6px; /* overlap into grid */
  height: 16px;
  line-height: 16px;
  padding-left: 40px; /* align past day labels */
  position: relative;
  z-index: 2;
  pointer-events: none;
}
.row-months span {
  text-align: left;
  pointer-events: none;
}

.row-body {
  display: flex;
  gap: 4px;
}

.day-labels {
  display: flex;
  flex-direction: column;
  gap: var(--cell-gap);
  margin-right: 4px;
  position: relative;
  z-index: 2;
}
.day-labels span {
  height: var(--cell-size);
  line-height: var(--cell-size);
  text-align: right;
  width: 32px;
}

.row-grid {
  display: grid;
  grid-template-rows: repeat(7, var(--cell-size));
  grid-auto-columns: var(--cell-size);
  grid-auto-flow: column;
  gap: var(--cell-gap);
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  border-radius: var(--cell-radius);
  background: var(--cell-empty);
  cursor: pointer;
  transition: outline 0.1s;
  outline: 2px solid transparent;
  outline-offset: -1px;
  position: relative;
  overflow: visible;
}
.cell:hover {
  outline-color: rgba(255,255,255,0.4);
}
.cell.future,
.cell.outside {
  visibility: hidden;
}
.cell-layer {
  position: absolute;
  inset: 0;
  border-radius: var(--cell-radius);
  mix-blend-mode: screen;
}

/* Tooltip */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: #1c2128;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
}
#tooltip.visible { opacity: 1; }

/* ── Feed peek indicator ───────────────────────────────────────── */
#feed-peek {
  text-align: center;
  padding: 16px 0 8px;
  color: var(--text-muted);
  font-size: 13px;
  letter-spacing: 0.5px;
  cursor: pointer;
}
#feed-peek:hover { color: var(--text); }
#feed-peek .arrow {
  display: block;
  font-size: 18px;
  animation: bob 2s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

/* ── Feed Section ──────────────────────────────────────────────── */
#feed-section {
  max-width: var(--feed-width);
  margin: 0 auto;
  padding: 0 16px 80px;
  position: relative;
  z-index: 1;
}

.feed-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  margin-bottom: 12px;
  overflow: hidden;
}

.feed-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.feed-dot {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  flex-shrink: 0;
}

.feed-date {
  font-weight: 600;
  font-size: 14px;
}

.feed-weekday {
  color: var(--text-muted);
  font-size: 13px;
  margin-left: auto;
}

.feed-tasks {
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.task-pill {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  font-weight: 500;
}
.task-pill.painting { background: rgba(171,35,18,0.2); color: rgb(220,70,50); }
.task-pill.coding   { background: rgba(45,56,155,0.2); color: rgb(80,96,210); }
.task-pill.writing  { background: rgba(40,140,35,0.2);  color: rgb(70,185,65); }
.task-pill.off      { background: rgba(255,255,255,0.05); color: var(--text-muted); text-decoration: line-through; }

.feed-body {
  padding: 12px 16px 16px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
}
.feed-body:empty { display: none; }

/* ── Empty state ───────────────────────────────────────────────── */
.feed-card.empty {
  border-style: dashed;
  opacity: 0.5;
}
</style>
</head>
<body>

<div id="bg-year">2026</div>
<div id="tooltip"></div>

<section id="calendar-section">
  <h1>Publish Daily</h1>
  <div id="legend">
    <span><span class="swatch" style="background:rgb(171,35,18)"></span>painting</span>
    <span><span class="swatch" style="background:rgb(45,56,155)"></span>coding</span>
    <span><span class="swatch" style="background:rgb(40,140,35)"></span>writing</span>
  </div>
  <div id="calendar-flow"></div>
  <div id="feed-peek" onclick="document.getElementById('feed-section').scrollIntoView({behavior:'smooth'})">
    <span class="arrow">&#x25BE;</span>
    feed
  </div>
</section>

<section id="feed-section"></section>

<script>
// ── Mock Data ────────────────────────────────────────────────────
// Tasks: painting (R), coding (B), writing (G)
// Additive color mixing on dark bg
const MOCK_DATA = generateMockData();

function generateMockData() {
  const data = {};
  const today = new Date();
  const phrases = {
    painting: [
      "Watercolor studies of morning light on the desk.",
      "Sketched character concepts for the comic project.",
      "Ink wash experiments — happy with the texture.",
      "Digital painting practice, focused on skin tones.",
      "Quick plein air sketch at the park.",
      "Worked on the oil painting of the harbor.",
    ],
    coding: [
      "Refactored the auth module, much cleaner now.",
      "Fixed that gnarly race condition in the queue.",
      "Built the calendar grid component from scratch.",
      "Paired on the API redesign, good progress.",
      "Wrote a CLI tool to automate deploys.",
      "Prototyped the new feed layout in vanilla JS.",
    ],
    writing: [
      "Drafted 1200 words on the essay about tools.",
      "Edited chapter 3, tightened the dialogue.",
      "Morning pages, stream of consciousness.",
      "Blog post about additive color mixing.",
      "Journaled about creative momentum.",
      "Outlined the next three newsletter issues.",
    ],
  };

  // Drifting probabilities create natural-looking clusters/phases
  let pPaint = 0.6 + Math.random() * 0.25;
  let pCode  = 0.6 + Math.random() * 0.25;
  let pWrite = 0.6 + Math.random() * 0.25;

  function drift(p) {
    // Random walk clamped to [0.05, 0.75]
    p += (Math.random() - 0.5) * 0.08;
    return Math.max(0.3, Math.min(0.9, p));
  }

  for (let i = 364; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = dateKey(d);

    // Drift each day (walk forward chronologically so clusters are contiguous)
    pPaint = drift(pPaint);
    pCode  = drift(pCode);
    pWrite = drift(pWrite);

    // Occasionally a bigger shift — new phase/obsession
    if (Math.random() < 0.03) pPaint = 0.3 + Math.random() * 0.55;
    if (Math.random() < 0.03) pCode  = 0.3 + Math.random() * 0.55;
    if (Math.random() < 0.03) pWrite = 0.3 + Math.random() * 0.55;

    const painting = Math.random() < pPaint;
    const coding   = Math.random() < pCode;
    const writing  = Math.random() < pWrite;

    if (!painting && !coding && !writing) continue;

    const parts = [];
    if (painting) parts.push(phrases.painting[Math.floor(Math.random() * phrases.painting.length)]);
    if (coding)   parts.push(phrases.coding[Math.floor(Math.random() * phrases.coding.length)]);
    if (writing)  parts.push(phrases.writing[Math.floor(Math.random() * phrases.writing.length)]);

    data[key] = {
      painting,
      coding,
      writing,
      content: parts.join("\n\n"),
    };
  }
  return data;
}

function dateKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// ── Color Channels ───────────────────────────────────────────────
const TASK_COLORS = {
  painting: 'rgb(171, 35, 18)',
  coding:   'rgb(45, 56, 155)',
  writing:  'rgb(40, 140, 35)',
};

// Composite color for feed dots / non-layered uses
function taskColor(entry) {
  if (!entry) return null;
  let r = 0, g = 0, b = 0;
  if (entry.painting) { r += 171; g += 35;  b += 18;  }
  if (entry.writing)  { r += 40;  g += 140; b += 35;  }
  if (entry.coding)   { r += 45;  g += 56;  b += 155; }
  return `rgb(${Math.min(r,255)}, ${Math.min(g,255)}, ${Math.min(b,255)})`;
}

// Build overlapping layer divs inside a cell
function addCellLayers(cell, entry) {
  if (!entry) return;
  const tasks = ['painting', 'coding', 'writing'].filter(t => entry[t]);
  if (tasks.length === 0) return;

  // Single task — no offset needed, just color the cell directly
  if (tasks.length === 1) {
    cell.style.background = TASK_COLORS[tasks[0]];
    return;
  }

  // Multiple tasks — overlapping layers with tiny random offsets
  cell.style.background = '#000'; // black base for screen blending
  tasks.forEach(t => {
    const layer = document.createElement('div');
    layer.className = 'cell-layer';
    layer.style.background = TASK_COLORS[t];
    const dx = (Math.random() - 0.5) * 2.5;
    const dy = (Math.random() - 0.5) * 2.5;
    layer.style.transform = `translate(${dx}px, ${dy}px)`;
    cell.appendChild(layer);
  });
}

// ── Build Calendar ───────────────────────────────────────────────
const today = new Date();
today.setHours(0, 0, 0, 0);

const calendarFlow = document.getElementById('calendar-flow');
const tooltip = document.getElementById('tooltip');
const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Build all weeks — start from the 1st of (current month + 1) last year
// so each month appears exactly once (e.g. Apr 2025 through Mar 2026)
const startMonth = new Date(today.getFullYear() - 1, today.getMonth() + 1, 1);
const startDay = new Date(startMonth);
startDay.setDate(startDay.getDate() - startDay.getDay()); // back to Sunday

const allWeeks = [];
{
  const c = new Date(startDay);
  while (c <= today) {
    allWeeks.push(new Date(c));
    c.setDate(c.getDate() + 7);
  }
}

// Determine how to split into rows based on viewport
function calcSplits() {
  const cellPx = calendarFlow.querySelector('.row-grid .cell')?.offsetWidth || 16;
  const gapPx = 5;
  const dayLabelW = 32;
  const available = calendarFlow.parentElement.clientWidth - 40; // padding
  const colW = cellPx + gapPx;
  const maxCols = Math.floor((available - dayLabelW) / colW);
  if (maxCols >= allWeeks.length) return [allWeeks.length]; // one row
  // Split into roughly equal rows
  const numRows = Math.ceil(allWeeks.length / maxCols);
  const perRow = Math.ceil(allWeeks.length / numRows);
  const splits = [];
  for (let i = 0; i < allWeeks.length; i += perRow) {
    splits.push(Math.min(perRow, allWeeks.length - i));
  }
  return splits;
}

function buildCalendar() {
  calendarFlow.innerHTML = '';

  // First pass: build with all weeks in one row to measure cell size
  // Then recalc splits and rebuild if needed
  const splits = calendarFlow.dataset.measured ? calcSplits() : [allWeeks.length];

  let weekOffset = 0;
  splits.forEach((rowWeekCount, rowIdx) => {
    const rowWeeks = allWeeks.slice(weekOffset, weekOffset + rowWeekCount);
    weekOffset += rowWeekCount;

    const rowContainer = document.createElement('div');
    rowContainer.className = 'calendar-row';

    // Month labels for this row
    const monthBar = document.createElement('div');
    monthBar.className = 'row-months cal-label';

    // Figure out month labels: label at column 0 for the month of the first week,
    // then label wherever a new month starts
    const colW = 1; // we'll set widths after measuring
    let lastMonth = -1;
    const labelData = [];
    rowWeeks.forEach((sunday, colIdx) => {
      // Check what month the majority of this week falls in
      // Use the Thursday (day+4) as the representative day
      const thu = new Date(sunday);
      thu.setDate(thu.getDate() + 3);
      const m = thu.getMonth();
      const y = thu.getFullYear();
      if (m !== lastMonth) {
        labelData.push({ month: m, year: y, col: colIdx });
        lastMonth = m;
      }
    });

    // Render month labels with proportional widths
    labelData.forEach((ld, i) => {
      const span = document.createElement('span');
      span.textContent = monthNames[ld.month];
      // Width = number of columns until next label (or end)
      const nextCol = (i < labelData.length - 1) ? labelData[i + 1].col : rowWeekCount;
      span.dataset.cols = nextCol - ld.col;
      monthBar.appendChild(span);
    });

    rowContainer.appendChild(monthBar);

    // Body: day labels + grid
    const body = document.createElement('div');
    body.className = 'row-body';

    const dl = document.createElement('div');
    dl.className = 'day-labels cal-label';
    for (let i = 0; i < 7; i++) {
      const span = document.createElement('span');
      span.textContent = dayNames[i];
      dl.appendChild(span);
    }
    body.appendChild(dl);

    const grid = document.createElement('div');
    grid.className = 'row-grid';

    rowWeeks.forEach(sunday => {
      for (let d = 0; d < 7; d++) {
        const day = new Date(sunday);
        day.setDate(day.getDate() + d);
        const key = dateKey(day);
        const entry = MOCK_DATA[key];
        const isFuture = day > today;

        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.date = key;

        if (isFuture) {
          cell.classList.add('future');
        } else {
          addCellLayers(cell, entry);

          cell.addEventListener('mouseenter', () => {
            const ent = MOCK_DATA[cell.dataset.date];
            let text = formatDateNice(cell.dataset.date);
            if (ent) {
              const tasks = [];
              if (ent.painting) tasks.push('painting');
              if (ent.coding) tasks.push('coding');
              if (ent.writing) tasks.push('writing');
              text += ' — ' + tasks.join(', ');
            } else {
              text += ' — no tasks';
            }
            tooltip.textContent = text;
            tooltip.classList.add('visible');
          });
          cell.addEventListener('mousemove', (e) => {
            tooltip.style.left = (e.clientX + 12) + 'px';
            tooltip.style.top = (e.clientY - 32) + 'px';
          });
          cell.addEventListener('mouseleave', () => {
            tooltip.classList.remove('visible');
          });
          cell.addEventListener('click', () => {
            const target = document.getElementById('day-' + cell.dataset.date);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
              target.style.outline = '2px solid rgba(255,255,255,0.5)';
              setTimeout(() => { target.style.outline = 'none'; }, 1500);
            }
          });
        }

        grid.appendChild(cell);
      }
    });

    body.appendChild(grid);
    rowContainer.appendChild(body);
    calendarFlow.appendChild(rowContainer);
  });

  // Size month labels now that the grid is rendered
  const firstCell = calendarFlow.querySelector('.row-grid .cell');
  if (firstCell) {
    const cellW = firstCell.offsetWidth + 5; // cell + gap
    calendarFlow.querySelectorAll('.row-months').forEach(bar => {
      bar.querySelectorAll('span').forEach(span => {
        span.style.width = (parseInt(span.dataset.cols) * cellW) + 'px';
      });
    });

    // If this was the first build, now recalc with real measurements
    if (!calendarFlow.dataset.measured) {
      calendarFlow.dataset.measured = '1';
      buildCalendar();
      return;
    }
  }
}

buildCalendar();

// Rebuild on resize (debounced)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    calendarFlow.dataset.measured = '1';
    buildCalendar();
  }, 200);
});

// ── Build Feed ───────────────────────────────────────────────────
const feedSection = document.getElementById('feed-section');
const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

for (let i = 0; i < 365; i++) {
  const d = new Date(today);
  d.setDate(d.getDate() - i);
  const key = dateKey(d);
  const entry = MOCK_DATA[key];

  const card = document.createElement('div');
  card.className = 'feed-card' + (!entry ? ' empty' : '');
  card.id = 'day-' + key;

  const color = taskColor(entry) || 'var(--cell-empty)';

  // Header
  const header = document.createElement('div');
  header.className = 'feed-header';
  header.innerHTML = `
    <div class="feed-dot" style="background:${color}"></div>
    <span class="feed-date">${key}</span>
    <span class="feed-weekday">${weekdays[d.getDay()]}</span>
  `;
  card.appendChild(header);

  // Task pills
  const tasks = document.createElement('div');
  tasks.className = 'feed-tasks';
  tasks.innerHTML = `
    <span class="task-pill ${entry?.painting ? 'painting' : 'off'}">painting</span>
    <span class="task-pill ${entry?.coding ? 'coding' : 'off'}">coding</span>
    <span class="task-pill ${entry?.writing ? 'writing' : 'off'}">writing</span>
  `;
  card.appendChild(tasks);

  // Body
  if (entry?.content) {
    const body = document.createElement('div');
    body.className = 'feed-body';
    body.innerHTML = entry.content.split('\n\n').map(p => `<p>${p}</p>`).join('');
    card.appendChild(body);
  }

  feedSection.appendChild(card);
}

// ── Helpers ──────────────────────────────────────────────────────
function formatDateNice(key) {
  const [y, m, d] = key.split('-');
  const dt = new Date(+y, +m - 1, +d);
  return weekdays[dt.getDay()] + ', ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()] + ' ' + +d;
}
</script>

</body>
</html>
