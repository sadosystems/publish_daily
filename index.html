<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300;400;700&family=JetBrains+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<title>Publish Daily</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --cell-empty: #252c35;
  --cell-gap: 5px;
  --cell-size: clamp(13px, 1.3vw, 22px);
  --cell-radius: 3px;
  --feed-width: 530px;
}

html { background: var(--bg); color: var(--text); }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Calendar Section ──────────────────────────────────────────── */
#calendar-section {
  min-height: calc(100vh - 31vh);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 20px 0;
  position: relative;
  z-index: 1;
}

#calendar-section h1 {
  font-family: 'Averia Serif Libre', serif;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
}

/* Legend */
#legend {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--text-muted);
}
#legend .swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: var(--cell-radius);
  margin-right: 4px;
  vertical-align: middle;
}

/* Calendar row layout */
#calendar-flow {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
  padding: 0 8px;
}

.calendar-row {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.cal-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  -webkit-text-stroke: 3px var(--bg);
  paint-order: stroke fill;
}

.row-months {
  display: flex;
  margin-bottom: -6px; /* overlap into grid */
  height: 16px;
  line-height: 16px;
  padding-left: 40px; /* align past day labels */
  position: relative;
  z-index: 2;
  pointer-events: none;
}
.row-months span {
  text-align: left;
  pointer-events: none;
}

.row-body {
  display: flex;
  gap: 4px;
}

.day-labels {
  display: flex;
  flex-direction: column;
  gap: var(--cell-gap);
  margin-right: 4px;
  margin-left: -4px;
  position: relative;
  z-index: 2;
}
.day-labels span {
  height: var(--cell-size);
  line-height: var(--cell-size);
  text-align: right;
  width: 32px;
}

.row-grid {
  display: grid;
  grid-template-rows: repeat(7, var(--cell-size));
  grid-auto-columns: var(--cell-size);
  grid-auto-flow: column;
  gap: var(--cell-gap);
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  border-radius: var(--cell-radius);
  background: var(--cell-empty);
  cursor: pointer;
  transition: outline 0.1s;
  outline: 2px solid transparent;
  outline-offset: -1px;
  position: relative;
  overflow: visible;
}
.cell:hover {
  outline-color: rgba(255,255,255,0.4);
}
.cell.future,
.cell.outside {
  visibility: hidden;
}
.cell-layer {
  position: absolute;
  inset: 0;
  border-radius: var(--cell-radius);
  mix-blend-mode: screen;
}

/* Tooltip */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: #1c2128;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  font-size: 12px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: stretch;
  gap: 0;
  overflow: hidden;
  padding: 0;
}
#tooltip.visible { opacity: 1; }
#tooltip .tip-date {
  padding: 6px 10px;
  display: flex;
  align-items: center;
}
#tooltip .tip-dots {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: var(--bg);
  border-left: 1px solid var(--border);
}
.tip-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
  -webkit-text-stroke: 2px rgba(0,0,0,0.5);
  paint-order: stroke fill;
}

/* ── Feed peek indicator ───────────────────────────────────────── */
#feed-peek {
  text-align: center;
  padding: 8px 0 4px;
  color: var(--text-muted);
  font-size: 13px;
  letter-spacing: 0.5px;
  cursor: pointer;
}
#feed-peek:hover { color: var(--text); }
#feed-peek .arrow {
  display: block;
  font-size: 18px;
  animation: bob 2s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

/* ── Feed Section ──────────────────────────────────────────────── */
#feed-section {
  max-width: var(--feed-width);
  margin: 0 auto;
  padding: 0 16px 80px;
  position: relative;
  z-index: 1;
  overflow: visible;
}

/* Day separator */
.day-separator {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 0 8px;
  color: var(--text-muted);
  font-size: 13px;
}
.day-separator:first-child { padding-top: 0; }
.day-group { /* measurement wrapper, no visual style */ }
#feed-spacer-top, #feed-spacer-bottom { width: 100%; pointer-events: none; }
#feed-sentinel-top, #feed-sentinel-bottom { height: 1px; width: 100%; pointer-events: none; }

/* Hide side-info by default (inline mode) */
.day-separator .sep-info { display: none; }

/* Left-side mode: applied via JS when there's room */
.day-separator.side-mode {
  position: relative;
  padding: 16px 0 4px;
}
.day-separator.side-mode .sep-info {
  position: absolute;
  right: calc(100% + 12px);
  top: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  font-size: 12px;
}
.day-separator.side-mode > .sep-dot-wrap,
.day-separator.side-mode > span,
.day-separator.side-mode > .sep-line {
  display: none;
}
.day-separator .sep-dot-wrap {
  width: 16px;
  height: 16px;
  position: relative;
  flex-shrink: 0;
}
.day-separator .sep-layer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  mix-blend-mode: screen;
}
.day-separator .sep-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Painting chip — polaroid style */
.chip-painting {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0;
  margin-bottom: 10px;
  padding: 8px;
}
.chip-painting img {
  width: 100%;
  display: block;
  position: relative;
  z-index: 1;
}
.chip-painting .img-wrap {
  position: relative;
  overflow: hidden;
}
.chip-painting .img-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(45deg, var(--surface) 25%, transparent 25%),
    linear-gradient(-45deg, var(--surface) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, var(--surface) 75%),
    linear-gradient(-45deg, transparent 75%, var(--surface) 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  background-color: var(--bg);
}

/* Coding chip — compact PR card */
.chip-coding {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 10px;
  padding: 10px 14px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  font-size: 12px;
  overflow: hidden;
}
.pr-title-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.pr-title-row svg { flex-shrink: 0; margin-top: 1px; }
.pr-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}
.pr-title .pr-num { color: var(--text-muted); font-weight: 400; }
.pr-meta-line {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-muted);
}
.pr-meta-line .badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-weight: 500;
  font-size: 11px;
}
.pr-meta-line .badge.merged { color: #a371f7; }
.pr-meta-line .badge.open { color: #3fb950; }
.pr-meta-line .badge svg { width: 12px; height: 12px; fill: currentColor; }
.pr-meta-line .sep { color: var(--border); }
.pr-meta-line .additions { color: #3fb950; }
.pr-meta-line .deletions { color: #f85149; }
.pr-meta-line .diffbar {
  display: inline-flex;
  gap: 1px;
  vertical-align: middle;
}
.pr-meta-line .diffbar span {
  width: 6px;
  height: 6px;
  border-radius: 1px;
  display: inline-block;
}
.pr-meta-line .diffbar .b-add { background: #3fb950; }
.pr-meta-line .diffbar .b-del { background: #f85149; }
.pr-meta-line .diffbar .b-neu { background: var(--border); }
.pr-desc {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  background: var(--bg);
  margin-left: -14px;
  margin-right: -14px;
  margin-bottom: -10px;
  padding: 8px 14px 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Writing chip — header + prose with fade */
.chip-writing {
  background: none;
  border: none;
  border-radius: 0;
  margin-bottom: 10px;
  overflow: hidden;
  padding: 0;
  position: relative;
}
.chip-writing h3 {
  font-family: 'Averia Serif Libre', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.25;
  letter-spacing: -0.01em;
}
.chip-writing .prose {
  font-family: 'Libre Baskerville', Georgia, serif;
  color: rgba(230, 237, 243, 0.7);
  font-size: 11px;
  line-height: 1.85;
  letter-spacing: 0.01em;
  max-height: calc(1.85em * 5);
  overflow: hidden;
  text-indent: 1.5em;
}
.chip-writing .prose-fade {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to bottom, transparent, var(--bg));
  display: flex;
  align-items: flex-end;
  justify-content: center;
  bottom: -4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  cursor: pointer;
  -webkit-text-stroke: 3px var(--bg);
  paint-order: stroke fill;
  text-shadow: 0 0 3px var(--bg), 0 0 6px var(--bg), 0 0 10px var(--bg), 0 2px 8px var(--bg);
}
.chip-writing .prose-fade:hover {
  color: var(--text);
}
</style>
</head>
<body>

<div id="tooltip"></div>

<section id="calendar-section">
  <h1>Publish Daily</h1>
  <div id="legend">
    <span><span class="swatch" style="background:rgb(171,35,18)"></span>painting</span>
    <span><span class="swatch" style="background:rgb(45,56,155)"></span>coding</span>
    <span><span class="swatch" style="background:rgb(40,140,35)"></span>writing</span>
  </div>
  <div id="calendar-flow"></div>
  <div id="feed-peek" onclick="document.getElementById('feed-section').scrollIntoView({behavior:'smooth'})">
    <span class="arrow">&#x25BE;</span>
    feed
  </div>
</section>

<section id="feed-section"></section>

<script>
// ── Mock Data ────────────────────────────────────────────────────
// Tasks: painting (R), coding (B), writing (G)
// Additive color mixing on dark bg
const DEMO_SINGLE_CHIP = false; // set true to show only one writing chip for today
const DEMO_DENSE = true; // set true for dense board: no missed days, mostly full
const MOCK_DATA = generateMockData();

function generateMockData() {
  const data = {};
  const today = new Date();

  if (DEMO_SINGLE_CHIP) {
    const key = dateKey(today);
    const writingPosts = [
      { title: "On the texture of daily practice", body: "There's something about showing up every day that changes the nature of the work itself. It stops being about any single output and becomes about the accumulated weight of attention. I've noticed that the days I least want to sit down are often the days that produce the most interesting results. Not because suffering is productive, but because resistance is a signal that you're pushing against the edge of what you know. The comfortable work is the work you've already mastered. The uncomfortable work is where growth lives. I don't think this means you should always be uncomfortable. But I think it means you should notice when you are, and lean into it a little before retreating to safety." },
    ];
    data[key] = { painting: 0, coding: 0, writing: 2, post: writingPosts[0] };
    return data;
  }
  const prData = [
    { title: "Fix calendar grid overflow on narrow viewports", num: 47, adds: 34, dels: 12, files: 2, commits: 1, merged: true, desc: "Cell size was unclamped, causing horizontal overflow under 900px." },
    { title: "Add additive RGB color blending for task layers", num: 42, adds: 156, dels: 23, files: 4, commits: 3, merged: true, desc: "Uses mix-blend-mode: screen on a black base to combine task color layers additively." },
    { title: "Implement feed card chip variants", num: 51, adds: 220, dels: 89, files: 3, commits: 5, merged: false, desc: "Adds three distinct chip types: polaroid images, mini PR cards, and editorial prose blocks." },
    { title: "Refactor week assignment logic for month boundaries", num: 44, adds: 67, dels: 91, files: 1, commits: 2, merged: true, desc: "Assigns each week to the month its Saturday falls in, eliminating duplicate boundary weeks." },
    { title: "Add rust WASM bindings for sketch engine", num: 18, adds: 412, dels: 3, files: 8, commits: 7, merged: false, desc: "Initial wasm-bindgen setup exposing draw_frame and the color palette to JS." },
    { title: "Dotfiles: add new tmux keybindings", num: 203, adds: 14, dels: 6, files: 1, commits: 1, merged: true, desc: "Adds prefix-a as a secondary prefix for quick pane switching." },
  ];
  const writingPosts = [
    { title: "On the texture of daily practice", body: "There's something about showing up every day that changes the nature of the work itself. It stops being about any single output and becomes about the accumulated weight of attention. I've noticed that the days I least want to sit down are often the days that produce the most interesting results. Not because suffering is productive, but because resistance is a signal that you're pushing against the edge of what you know. The comfortable work is the work you've already mastered. The uncomfortable work is where growth lives. I don't think this means you should always be uncomfortable. But I think it means you should notice when you are, and lean into it a little before retreating to safety." },
    { title: "Tools shape the hand that holds them", body: "I switched from Procreate to oil paint last month and the difference isn't just tactile. The way I think about composition has changed. Digital tools let you undo, so you plan less. Oil forces commitment. Every stroke is a decision you have to live with or paint over, and painting over leaves a trace. There's a metaphor in there about how the tools we choose for thinking shape the thoughts we're capable of having. A word processor thinks in paragraphs. A typewriter thinks in pages. A pen thinks in sentences. I wonder what we lose when we optimize for ease of revision." },
    { title: "The color of Tuesday", body: "I've been tracking my creative output for six months now and I'm starting to see patterns I didn't expect. Tuesdays are almost always my most productive painting days. Thursdays are for writing. I can't explain it. There's no structural reason for this. My schedule is the same every day. But the data doesn't lie. Maybe there's some weekly rhythm in energy or attention that I'm not consciously aware of. Or maybe I just happened to have a few good Tuesdays early on and the pattern became self-reinforcing." },
    { title: "Against optimization", body: "Everyone wants to optimize their creative process. Wake up at 5am. Use the Pomodoro technique. Batch your tasks. Eliminate distractions. I've tried all of it and the thing that actually works is much simpler and much harder: care about what you're making. When I care, the hours disappear. When I don't, no amount of productivity theater will save the work. The hard part isn't finding the right system. The hard part is finding the right project. Everything else follows from genuine interest." },
    { title: "What the calendar shows", body: "Looking at a year of creative work compressed into colored squares is a strange experience. Some weeks are dense with activity, every cell lit up. Others are sparse. The temptation is to judge the sparse weeks as failures, but when I click into them I often find that those were the weeks I was thinking. Germinating. The work that followed was better for the pause. Not every gap is procrastination. Some gaps are preparation. The calendar can't tell you which is which. Only you know." },
    { title: "Additive color as creative metaphor", body: "The way this site blends red, green, and blue for painting, coding, and writing feels accidentally profound. When you do all three, the result isn't muddy. It's bright. Almost white. In subtractive color mixing, combining everything makes brown. In additive mixing, combining everything makes light. I like the idea that creative pursuits combine additively. Writing doesn't take away from painting. Coding doesn't diminish writing. They illuminate each other. The days I do all three feel like that. Not exhausting. Luminous." },
  ];

  // Dense mode: ramps from empty to fully active over the year
  if (DEMO_DENSE) {
    for (let i = 364; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = dateKey(d);
      // progress: 0 at start of year, 1 at today
      const progress = (364 - i) / 364;
      // Chance of each task being active ramps with progress
      const taskChance = progress;
      // Level biases toward 2 as progress increases
      const pick = () => {
        if (Math.random() > taskChance) return 0;
        return Math.random() < progress ? 2 : 1;
      };
      const painting = pick();
      const coding = pick();
      const writing = pick();
      if (!painting && !coding && !writing) continue;
      const entry = { painting, coding, writing };
      if (coding)  entry.pr = prData[Math.floor(Math.random() * prData.length)];
      if (writing) entry.post = writingPosts[Math.floor(Math.random() * writingPosts.length)];
      data[key] = entry;
    }
    return data;
  }

  // Drifting probabilities create natural-looking clusters/phases
  let pPaint = 0.6 + Math.random() * 0.25;
  let pCode  = 0.6 + Math.random() * 0.25;
  let pWrite = 0.6 + Math.random() * 0.25;

  function drift(p) {
    // Random walk clamped to [0.05, 0.75]
    p += (Math.random() - 0.5) * 0.08;
    return Math.max(0.3, Math.min(0.9, p));
  }

  for (let i = 364; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = dateKey(d);

    // Drift each day (walk forward chronologically so clusters are contiguous)
    pPaint = drift(pPaint);
    pCode  = drift(pCode);
    pWrite = drift(pWrite);

    // Occasionally a bigger shift — new phase/obsession
    if (Math.random() < 0.03) pPaint = 0.3 + Math.random() * 0.55;
    if (Math.random() < 0.03) pCode  = 0.3 + Math.random() * 0.55;
    if (Math.random() < 0.03) pWrite = 0.3 + Math.random() * 0.55;

    // 0-2 levels: 0 = didn't do it, 1 = some, 2 = full
    const painting = Math.random() < pPaint ? Math.ceil(Math.random() * 2) : 0;
    const coding   = Math.random() < pCode  ? Math.ceil(Math.random() * 2) : 0;
    const writing  = Math.random() < pWrite ? Math.ceil(Math.random() * 2) : 0;

    if (!painting && !coding && !writing) continue;

    const entry = { painting, coding, writing };
    if (coding)  entry.pr = prData[Math.floor(Math.random() * prData.length)];
    if (writing) entry.post = writingPosts[Math.floor(Math.random() * writingPosts.length)];

    data[key] = entry;
  }
  return data;
}

function dateKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// ── Color Channels ───────────────────────────────────────────────
const TASK_COLORS = {
  painting: 'rgb(171, 35, 18)',
  coding:   'rgb(45, 56, 155)',
  writing:  'rgb(40, 140, 35)',
};
// Level hue shifts — subtle per-level color variation
const TASK_COLORS_L1 = {
  painting: 'rgb(171, 35, 18)',
  coding:   'rgb(48, 52, 158)',
  writing:  'rgb(35, 140, 42)',
};
const TASK_COLORS_L2 = {
  painting: 'rgb(180, 50, 12)',
  coding:   'rgb(40, 72, 165)',
  writing:  'rgb(48, 144, 30)',
};
function taskColorForLevel(task, level) {
  return level >= 2 ? TASK_COLORS_L2[task] : TASK_COLORS_L1[task];
}

// Composite color for feed dots / non-layered uses
function taskColor(entry) {
  if (!entry) return null;
  let r = 0, g = 0, b = 0;
  const s = (level) => level / 2; // scale 0-1
  if (entry.painting) { const k = s(entry.painting); r += 171*k; g += 35*k;  b += 18*k;  }
  if (entry.writing)  { const k = s(entry.writing);  r += 40*k;  g += 140*k; b += 35*k;  }
  if (entry.coding)   { const k = s(entry.coding);   r += 45*k;  g += 56*k;  b += 155*k; }
  return `rgb(${Math.min(Math.round(r),255)}, ${Math.min(Math.round(g),255)}, ${Math.min(Math.round(b),255)})`;
}

// Build overlapping layer divs inside a cell
function addCellLayers(cell, entry) {
  if (!entry) return;
  const tasks = ['painting', 'coding', 'writing'].filter(t => entry[t]);
  if (tasks.length === 0) return;

  if (tasks.length === 1) {
    // Single task: blend between cell-empty and the task color based on level
    const level = entry[tasks[0]];
    const t = level === 1 ? 0.75 : 1;
    // Parse the task color
    const [, cr, cg, cb] = taskColorForLevel(tasks[0], level).match(/(\d+),\s*(\d+),\s*(\d+)/);
    // Empty cell base: #252c35 = 37, 44, 53
    const r = Math.round(37 + (+cr - 37) * t);
    const g = Math.round(44 + (+cg - 44) * t);
    const b = Math.round(53 + (+cb - 53) * t);
    cell.style.background = `rgb(${r}, ${g}, ${b})`;
    return;
  }

  // Multiple tasks: black base + screen blended layers
  cell.style.background = '#000';
  tasks.forEach(t => {
    const level = entry[t]; // 1, 2, or 3
    const layer = document.createElement('div');
    layer.className = 'cell-layer';
    layer.style.background = taskColorForLevel(t, level);
    layer.style.opacity = (level === 1 ? 0.75 : 1).toFixed(2);
    const dx = (Math.random() - 0.5) * 3;
    const dy = (Math.random() - 0.5) * 3;
    layer.style.transform = `translate(${dx}px, ${dy}px)`;
    cell.appendChild(layer);
  });
}

// ── Build Calendar ───────────────────────────────────────────────
const today = new Date();
today.setHours(0, 0, 0, 0);

const calendarFlow = document.getElementById('calendar-flow');
const tooltip = document.getElementById('tooltip');
const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Build all weeks — start from the 1st of (current month + 1) last year
// so each month appears exactly once (e.g. Apr 2025 through Mar 2026)
const startMonth = new Date(today.getFullYear() - 1, today.getMonth() + 1, 1);
const startDay = new Date(startMonth);
startDay.setDate(startDay.getDate() - startDay.getDay()); // back to Sunday

const allWeeks = [];
{
  const c = new Date(startDay);
  while (c <= today) {
    allWeeks.push(new Date(c));
    c.setDate(c.getDate() + 7);
  }
}

// Determine how to split into rows based on viewport
function calcSplits() {
  const cellPx = calendarFlow.querySelector('.row-grid .cell')?.offsetWidth || 16;
  const gapPx = 5;
  const dayLabelW = 32;
  const available = calendarFlow.parentElement.clientWidth - 40; // padding
  const colW = cellPx + gapPx;
  const maxCols = Math.floor((available - dayLabelW) / colW);
  if (maxCols >= allWeeks.length) return [allWeeks.length]; // one row
  // Split into roughly equal rows
  const numRows = Math.ceil(allWeeks.length / maxCols);
  const perRow = Math.ceil(allWeeks.length / numRows);
  const splits = [];
  for (let i = 0; i < allWeeks.length; i += perRow) {
    splits.push(Math.min(perRow, allWeeks.length - i));
  }
  return splits;
}

function buildCalendar() {
  calendarFlow.innerHTML = '';

  // First pass: build with all weeks in one row to measure cell size
  // Then recalc splits and rebuild if needed
  const splits = calendarFlow.dataset.measured ? calcSplits() : [allWeeks.length];

  let weekOffset = 0;
  splits.forEach((rowWeekCount, rowIdx) => {
    const rowWeeks = allWeeks.slice(weekOffset, weekOffset + rowWeekCount);
    weekOffset += rowWeekCount;

    const rowContainer = document.createElement('div');
    rowContainer.className = 'calendar-row';

    // Month labels for this row
    const monthBar = document.createElement('div');
    monthBar.className = 'row-months cal-label';

    // Figure out month labels: label at column 0 for the month of the first week,
    // then label wherever a new month starts
    const colW = 1; // we'll set widths after measuring
    let lastMonth = -1;
    const labelData = [];
    rowWeeks.forEach((sunday, colIdx) => {
      // Check what month the majority of this week falls in
      // Use the Thursday (day+4) as the representative day
      const thu = new Date(sunday);
      thu.setDate(thu.getDate() + 3);
      const m = thu.getMonth();
      const y = thu.getFullYear();
      if (m !== lastMonth) {
        labelData.push({ month: m, year: y, col: colIdx });
        lastMonth = m;
      }
    });

    // Render month labels with proportional widths
    labelData.forEach((ld, i) => {
      const span = document.createElement('span');
      span.textContent = monthNames[ld.month];
      // Width = number of columns until next label (or end)
      const nextCol = (i < labelData.length - 1) ? labelData[i + 1].col : rowWeekCount;
      span.dataset.cols = nextCol - ld.col;
      monthBar.appendChild(span);
    });

    rowContainer.appendChild(monthBar);

    // Body: day labels + grid
    const body = document.createElement('div');
    body.className = 'row-body';

    const dl = document.createElement('div');
    dl.className = 'day-labels cal-label';
    for (let i = 0; i < 7; i++) {
      const span = document.createElement('span');
      span.textContent = dayNames[i];
      dl.appendChild(span);
    }
    body.appendChild(dl);

    const grid = document.createElement('div');
    grid.className = 'row-grid';

    rowWeeks.forEach(sunday => {
      for (let d = 0; d < 7; d++) {
        const day = new Date(sunday);
        day.setDate(day.getDate() + d);
        const key = dateKey(day);
        const entry = MOCK_DATA[key];
        const isFuture = day > today;

        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.date = key;

        if (isFuture) {
          cell.classList.add('future');
        } else {
          addCellLayers(cell, entry);

          cell.addEventListener('mouseenter', () => {
            const ent = MOCK_DATA[cell.dataset.date];
            const dateStr = formatDateNice(cell.dataset.date);
            // Build tooltip: date text + colored dots
            tooltip.innerHTML = '<span class="tip-date">' + dateStr + '</span>' +
              '<span class="tip-dots">' + tipDot('painting', ent) + tipDot('coding', ent) + tipDot('writing', ent) + '</span>';
            tooltip.classList.add('visible');
          });
          cell.addEventListener('mousemove', (e) => {
            tooltip.style.left = (e.clientX + 12) + 'px';
            tooltip.style.top = (e.clientY - 32) + 'px';
          });
          cell.addEventListener('mouseleave', () => {
            tooltip.classList.remove('visible');
          });
          cell.addEventListener('click', () => {
            const key = cell.dataset.date;
            if (typeof VirtualFeed !== 'undefined') {
              VirtualFeed.goToDay(key);
            } else {
              const target = document.getElementById('day-' + key);
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                highlightDay(target);
              }
            }
          });
        }

        grid.appendChild(cell);
      }
    });

    body.appendChild(grid);
    rowContainer.appendChild(body);
    calendarFlow.appendChild(rowContainer);
  });

  // Size month labels now that the grid is rendered
  const firstCell = calendarFlow.querySelector('.row-grid .cell');
  if (firstCell) {
    const cellW = firstCell.offsetWidth + 5; // cell + gap
    calendarFlow.querySelectorAll('.row-months').forEach(bar => {
      bar.querySelectorAll('span').forEach(span => {
        span.style.width = (parseInt(span.dataset.cols) * cellW) + 'px';
      });
    });

    // If this was the first build, now recalc with real measurements
    if (!calendarFlow.dataset.measured) {
      calendarFlow.dataset.measured = '1';
      buildCalendar();
      return;
    }
  }
}

buildCalendar();

// Rebuild on resize (debounced)
let resizeTimer;

// ── Build Feed (Virtualized) ─────────────────────────────────────
const feedSection = document.getElementById('feed-section');
const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function highlightDay(el) {
  el.style.outline = '2px solid rgba(255,255,255,0.5)';
  setTimeout(() => { el.style.outline = 'none'; }, 1500);
}

// Pre-compute active days list (reverse chronological)
const activeDays = [];
for (let i = 0; i < 365; i++) {
  const d = new Date(today);
  d.setDate(d.getDate() - i);
  const key = dateKey(d);
  if (MOCK_DATA[key]) activeDays.push(key);
}

// Seeded random per date key so re-renders look the same
function seededRandom(key) {
  let h = 0;
  for (let i = 0; i < key.length; i++) { h = ((h << 5) - h + key.charCodeAt(i)) | 0; }
  return function() { h = (h * 16807 + 0) & 0x7fffffff; return (h & 0xffff) / 0x10000; };
}

// Render a single day's content into a wrapper div
function renderDay(key) {
  const entry = MOCK_DATA[key];
  if (!entry) return null;
  const rng = seededRandom(key);
  const d = new Date(key + 'T12:00:00');

  const group = document.createElement('div');
  group.className = 'day-group';
  group.dataset.key = key;

  // Day separator
  const sep = document.createElement('div');
  sep.className = 'day-separator';
  sep.id = 'day-' + key;

  const dotWrap = document.createElement('div');
  dotWrap.className = 'sep-dot-wrap';
  const activeTasks = ['painting', 'coding', 'writing'].filter(t => entry[t]);
  if (activeTasks.length === 1) {
    dotWrap.style.borderRadius = '50%';
    const lvl = entry[activeTasks[0]];
    const [, cr, cg, cb] = taskColorForLevel(activeTasks[0], lvl).match(/(\d+),\s*(\d+),\s*(\d+)/);
    const t = lvl === 1 ? 0.75 : 1;
    dotWrap.style.background = `rgb(${Math.round(37+(cr-37)*t)},${Math.round(44+(cg-44)*t)},${Math.round(53+(cb-53)*t)})`;
  } else {
    dotWrap.style.borderRadius = '50%';
    activeTasks.forEach(task => {
      const layer = document.createElement('div');
      layer.className = 'sep-layer';
      layer.style.background = taskColorForLevel(task, entry[task]);
      layer.style.opacity = (entry[task] === 1 ? 0.75 : 1).toFixed(2);
      const dx = (rng() - 0.5) * 5.5;
      const dy = (rng() - 0.5) * 5.5;
      layer.style.transform = `translate(${dx}px, ${dy}px)`;
      dotWrap.appendChild(layer);
    });
  }

  sep.appendChild(dotWrap.cloneNode(true));
  sep.insertAdjacentHTML('beforeend', `
    <span>${key} &middot; ${weekdays[d.getDay()]}</span>
    <div class="sep-line"></div>
  `);

  const sideInfo = document.createElement('div');
  sideInfo.className = 'sep-info';
  sideInfo.appendChild(dotWrap);
  sideInfo.insertAdjacentHTML('beforeend', `<span>${key} &middot; ${weekdays[d.getDay()]}</span>`);
  sep.appendChild(sideInfo);
  group.appendChild(sep);

  // Painting chip
  if (entry.painting) {
    const chip = document.createElement('div');
    chip.className = 'chip-painting';
    chip.id = 'chip-' + key + '-painting';
    const paintImgs = ['publish_daily_1.png', 'publish_daily_2.png', 'logo_card.png'];
    const paintSrc = paintImgs[Math.floor(rng() * paintImgs.length)];
    chip.innerHTML = `<div class="img-wrap"><img src="${paintSrc}" alt="painting" loading="lazy"></div>`;
    group.appendChild(chip);
  }

  // Coding chip
  if (entry.coding) {
    const pr = entry.pr;
    const chip = document.createElement('div');
    chip.className = 'chip-coding';
    chip.id = 'chip-' + key + '-coding';
    const mIcon = pr.merged
      ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="#a371f7"><path d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8.5-4.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM4.25 4a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"></path></svg>`
      : `<svg width="16" height="16" viewBox="0 0 16 16" fill="#3fb950"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"></path></svg>`;
    const mBadge = `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="${pr.merged ? 'M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8.5-4.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM4.25 4a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z' : 'M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z'}"></path></svg>`;
    const tot = pr.adds + pr.dels;
    const aB = tot > 0 ? Math.round((pr.adds / tot) * 5) : 0;
    const dB = tot > 0 ? Math.round((pr.dels / tot) * 5) : 0;
    const nB = Math.max(0, 5 - aB - dB);
    let bar = '';
    for (let b = 0; b < aB; b++) bar += '<span class="b-add"></span>';
    for (let b = 0; b < dB; b++) bar += '<span class="b-del"></span>';
    for (let b = 0; b < nB; b++) bar += '<span class="b-neu"></span>';
    chip.innerHTML = `
      <div class="pr-title-row">${mIcon}<span class="pr-title">${pr.title} <span class="pr-num">#${pr.num}</span></span></div>
      <div class="pr-meta-line">
        <span class="badge ${pr.merged ? 'merged' : 'open'}">${mBadge} ${pr.merged ? 'Merged' : 'Open'}</span>
        <span class="sep">·</span>
        <span>${pr.files} file${pr.files > 1 ? 's' : ''}</span>
        <span class="sep">·</span>
        <span>${pr.commits} commit${pr.commits > 1 ? 's' : ''}</span>
        <span class="sep">·</span>
        <span class="additions">+${pr.adds}</span>
        <span class="deletions">−${pr.dels}</span>
        <span class="diffbar">${bar}</span>
      </div>
      <div class="pr-desc">${pr.desc}</div>
    `;
    group.appendChild(chip);
  }

  // Writing chip
  if (entry.writing) {
    const chip = document.createElement('div');
    chip.className = 'chip-writing';
    chip.id = 'chip-' + key + '-writing';
    chip.innerHTML = `
      <h3>${entry.post.title}</h3>
      <div class="prose">${entry.post.body}</div>
      <div class="prose-fade">continue reading →</div>
    `;
    group.appendChild(chip);
  }

  return group;
}

// ── Virtual Feed Controller ──────────────────────────────────────
const VirtualFeed = {
  WINDOW_SIZE: 30,
  BUFFER: 10,
  startIdx: 0,
  endIdx: 0,
  heightRegistry: {},
  avgDayHeight: 200,
  spacerTop: null,
  spacerBottom: null,
  sentinelTop: null,
  sentinelBottom: null,
  window: null,
  observer: null,

  init() {
    // Build DOM scaffold
    this.spacerTop = document.createElement('div');
    this.spacerTop.id = 'feed-spacer-top';
    this.sentinelTop = document.createElement('div');
    this.sentinelTop.id = 'feed-sentinel-top';
    this.window = document.createElement('div');
    this.window.id = 'feed-window';
    this.sentinelBottom = document.createElement('div');
    this.sentinelBottom.id = 'feed-sentinel-bottom';
    this.spacerBottom = document.createElement('div');
    this.spacerBottom.id = 'feed-spacer-bottom';

    feedSection.appendChild(this.spacerTop);
    feedSection.appendChild(this.sentinelTop);
    feedSection.appendChild(this.window);
    feedSection.appendChild(this.sentinelBottom);
    feedSection.appendChild(this.spacerBottom);

    // Initial render
    this.endIdx = Math.min(this.WINDOW_SIZE, activeDays.length);
    this.renderWindow();

    // Set up IntersectionObserver
    this.observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        if (entry.target === this.sentinelTop) this.extendTop();
        if (entry.target === this.sentinelBottom) this.extendBottom();
      }
    }, { rootMargin: '300px 0px', threshold: 0 });

    this.observer.observe(this.sentinelTop);
    this.observer.observe(this.sentinelBottom);

    // Handle deep links
    if (window.location.hash) this.handleHash();
    window.addEventListener('hashchange', () => this.handleHash());
  },

  renderWindow() {
    this.window.innerHTML = '';
    for (let i = this.startIdx; i < this.endIdx; i++) {
      const el = renderDay(activeDays[i]);
      if (el) this.window.appendChild(el);
    }
    this.measureRendered();
    this.updateSpacers();
    updateSeparatorMode();
  },

  measureRendered() {
    const groups = this.window.querySelectorAll('.day-group');
    let totalMeasured = 0;
    let count = 0;
    groups.forEach(g => {
      const h = g.offsetHeight;
      this.heightRegistry[g.dataset.key] = h;
      totalMeasured += h;
      count++;
    });
    if (count > 0) this.avgDayHeight = totalMeasured / count;
  },

  heightFor(idx) {
    const key = activeDays[idx];
    return this.heightRegistry[key] || this.avgDayHeight;
  },

  updateSpacers() {
    let topH = 0;
    for (let i = 0; i < this.startIdx; i++) topH += this.heightFor(i);
    let bottomH = 0;
    for (let i = this.endIdx; i < activeDays.length; i++) bottomH += this.heightFor(i);
    this.spacerTop.style.height = topH + 'px';
    this.spacerBottom.style.height = bottomH + 'px';
  },

  extendTop() {
    if (this.startIdx <= 0) return;
    const oldStart = this.startIdx;
    this.startIdx = Math.max(0, this.startIdx - this.BUFFER);

    // Prepend new days
    const frag = document.createDocumentFragment();
    for (let i = this.startIdx; i < oldStart; i++) {
      const el = renderDay(activeDays[i]);
      if (el) frag.appendChild(el);
    }

    const scrollBefore = document.documentElement.scrollTop || document.body.scrollTop;
    const heightBefore = this.window.offsetHeight;

    this.window.insertBefore(frag, this.window.firstChild);

    // Measure new content and adjust scroll to prevent jump
    const heightAfter = this.window.offsetHeight;
    const delta = heightAfter - heightBefore;
    window.scrollBy(0, delta);

    // Trim bottom if too large
    if (this.endIdx - this.startIdx > this.WINDOW_SIZE + this.BUFFER) {
      const trimCount = (this.endIdx - this.startIdx) - this.WINDOW_SIZE;
      for (let i = 0; i < trimCount; i++) {
        const last = this.window.lastElementChild;
        if (last) last.remove();
      }
      this.endIdx -= trimCount;
    }

    this.measureRendered();
    this.updateSpacers();
    updateSeparatorMode();
  },

  extendBottom() {
    if (this.endIdx >= activeDays.length) return;
    const oldEnd = this.endIdx;
    this.endIdx = Math.min(activeDays.length, this.endIdx + this.BUFFER);

    // Append new days
    for (let i = oldEnd; i < this.endIdx; i++) {
      const el = renderDay(activeDays[i]);
      if (el) this.window.appendChild(el);
    }

    // Trim top if too large
    if (this.endIdx - this.startIdx > this.WINDOW_SIZE + this.BUFFER) {
      const trimCount = (this.endIdx - this.startIdx) - this.WINDOW_SIZE;
      let trimmedHeight = 0;
      for (let i = 0; i < trimCount; i++) {
        const first = this.window.firstElementChild;
        if (first) {
          trimmedHeight += first.offsetHeight;
          first.remove();
        }
      }
      this.startIdx += trimCount;
    }

    this.measureRendered();
    this.updateSpacers();
    updateSeparatorMode();
  },

  goToDay(key) {
    const idx = activeDays.indexOf(key);
    if (idx === -1) return;

    // Check if already rendered and close enough
    const existing = document.getElementById('day-' + key);
    if (existing) {
      const rect = existing.getBoundingClientRect();
      const dist = Math.abs(rect.top - window.innerHeight / 2);
      if (dist < window.innerHeight * 2) {
        existing.scrollIntoView({ behavior: 'smooth', block: 'center' });
        highlightDay(existing);
        history.replaceState(null, '', '#day-' + key);
        return;
      }
    }

    // Teleport: center window around target
    const half = Math.floor(this.WINDOW_SIZE / 2);
    this.startIdx = Math.max(0, idx - half);
    this.endIdx = Math.min(activeDays.length, this.startIdx + this.WINDOW_SIZE);
    this.startIdx = Math.max(0, this.endIdx - this.WINDOW_SIZE);

    this.renderWindow();

    requestAnimationFrame(() => {
      const el = document.getElementById('day-' + key);
      if (el) {
        el.scrollIntoView({ block: 'center' });
        highlightDay(el);
      }
      history.replaceState(null, '', '#day-' + key);
    });
  },

  handleHash() {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    const match = hash.match(/^(?:day|chip)-([\d-]+)/);
    if (!match) return;
    const key = match[1];
    // For chip hashes like chip-2026-03-28-painting, extract the date
    const dateMatch = key.match(/^(\d{4}-\d{2}-\d{2})/);
    if (!dateMatch) return;
    this.goToDay(dateMatch[1]);
    requestAnimationFrame(() => {
      const el = document.getElementById(hash);
      if (el) el.scrollIntoView({ block: 'center' });
    });
  }
};

VirtualFeed.init();

// ── Toggle side-mode on separators based on available space ──────
function updateSeparatorMode() {
  const seps = feedSection.querySelectorAll('.day-separator');
  if (!seps.length) return;
  const feedRect = feedSection.getBoundingClientRect();
  const leftSpace = feedRect.left;
  const needsSide = leftSpace > 200;
  seps.forEach(s => s.classList.toggle('side-mode', needsSide));
}
updateSeparatorMode();
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    calendarFlow.dataset.measured = '1';
    buildCalendar();
    updateSeparatorMode();
  }, 200);
});

// ── Tooltip dot helper ───────────────────────────────────────────
function tipDot(task, entry) {
  const level = entry ? (entry[task] || 0) : 0;
  let bg;
  if (level === 0) {
    bg = 'var(--cell-empty)';
  } else {
    // Lerp from cell-empty (37,44,53) to task color, same as calendar cells
    const [, cr, cg, cb] = TASK_COLORS[task].match(/(\d+),\s*(\d+),\s*(\d+)/);
    const t = level / 2;
    const r = Math.round(37 + (+cr - 37) * t);
    const g = Math.round(44 + (+cg - 44) * t);
    const b = Math.round(53 + (+cb - 53) * t);
    bg = `rgb(${r},${g},${b})`;
  }
  return `<span class="tip-dot" style="background:${bg}">${level}</span>`;
}

// ── Helpers ──────────────────────────────────────────────────────
function formatDateNice(key) {
  const [y, m, d] = key.split('-');
  const dt = new Date(+y, +m - 1, +d);
  return weekdays[dt.getDay()] + ', ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()] + ' ' + +d;
}
